<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCOLOW - Coming Soon</title>
    <!-- Import Font Syne -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            position: relative;
        }

        /* Canvas Background */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Sotto i testi */
            pointer-events: all;
        }

        /* Navigazione superiore */
        .top-nav {
            position: absolute;
            top: 2rem;
            width: 100%;
            display: flex;
            justify-content: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            z-index: 10;
        }

        .title-giant {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(4rem, 22vw, 14rem);
            letter-spacing: -0.05em;
            line-height: 0.8;
            text-transform: uppercase;
            user-select: none;
            text-align: center;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5; /* Sopra le particelle */
            pointer-events: none; /* Permette al mouse di interagire con le particelle sotto */
        }

        .title-word {
            display: block;
        }

        @media (min-width: 1024px) {
            .title-giant {
                flex-direction: row;
                gap: 0;
                line-height: 0.85;
            }
            .title-word {
                display: inline;
            }
        }

        .bottom-nav {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .bottom-nav {
                flex-direction: column;
                gap: 2rem;
                bottom: 2rem;
            }
            .flex-1 {
                text-align: center !important;
                width: 100%;
            }
            .order-mobile-1 { order: 1; }
            .order-mobile-2 { order: 2; }
            .order-mobile-3 { order: 3; }
        }

        a {
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid transparent;
        }

        a:hover {
            opacity: 0.6;
            border-bottom: 1px solid #fff;
        }

        .audio-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .audio-status-label {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .audio-control {
            cursor: pointer;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .audio-control:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .playing .bar {
            animation: sound 0.5s infinite ease-in-out alternate;
        }

        @keyframes sound {
            0% { height: 4px; }
            100% { height: 16px; }
        }

        .bar {
            width: 2px;
            height: 12px;
            background: white;
            margin: 0 1.5px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <!-- Sfondo Particellare -->
    <canvas id="particleCanvas"></canvas>

    <!-- Navigazione Superiore -->
    <div class="top-nav">
        <span>8BINARY</span>
    </div>

    <!-- Titolo Principale -->
    <h1 class="title-giant">
        <span class="title-word">DISCO</span>
        <span class="title-word">LOW</span>
    </h1>

    <!-- Navigazione Inferiore -->
    <div class="bottom-nav">
        <!-- Sinistra: Instagram -->
        <div class="flex-1 text-left order-mobile-2">
            <a href="https://www.instagram.com/disco_low" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>

        <!-- Centro: Audio Control -->
        <div class="flex-1 flex justify-center order-mobile-1">
            <div class="audio-wrapper">
                <div id="audio-btn" class="audio-control" onclick="toggleAudio()" title="Play/Pause Audio">
                    <div id="visualizer" class="flex items-end h-4">
                        <span class="bar" style="animation-delay: 0.1s"></span>
                        <span class="bar" style="animation-delay: 0.3s"></span>
                        <span class="bar" style="animation-delay: 0.2s"></span>
                    </div>
                </div>
                <span id="audio-label" class="audio-status-label">DISCO OFF</span>
            </div>
        </div>

        <!-- Destra: Email -->
        <div class="flex-1 text-right order-mobile-3">
            <a href="mailto:info@8b8b.it">contact | booking</a>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="bg-audio" loop>
        <source src="Discolow_Jungle-Fu.mp3" type="audio/mpeg">
        Il tuo browser non supporta l'elemento audio.
    </audio>

    <script>
        /* --- LOGICA PARTICELLE --- */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let mouseX = null;
        let mouseY = null;
        let particles = [];
        const numParticles = 120; // Ridotto per performance
        const repulsionDistance = 180;
        const repulsionStrength = 0.4;

        const platonicSolids = [
            { name: 'tetrahedron', sides: 3 },
            { name: 'cube', sides: 4 },
            { name: 'hexagon', sides: 6 }
        ];

        function drawPolygon(ctx, x, y, radius, sides) {
            ctx.beginPath();
            const angleStep = (Math.PI * 2) / sides;
            let angle = -Math.PI / 2;
            ctx.moveTo(x + radius * Math.cos(angle), y + radius * Math.sin(angle));
            for (let i = 1; i < sides; i++) {
                angle += angleStep;
                ctx.lineTo(x + radius * Math.cos(angle), y + radius * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fill();
        }

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 4 + 2;
                this.velocityX = (Math.random() - 0.5) * 1.5;
                this.velocityY = (Math.random() - 0.5) * 1.5;
                this.alpha = Math.random() * 0.5 + 0.1;
                this.sides = platonicSolids[Math.floor(Math.random() * platonicSolids.length)].sides;
            }
            update() {
                if (mouseX !== null && mouseY !== null) {
                    let dx = this.x - mouseX;
                    let dy = this.y - mouseY;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < repulsionDistance) {
                        let force = (repulsionDistance - distance) / repulsionDistance;
                        this.velocityX += (dx / distance) * force * repulsionStrength;
                        this.velocityY += (dy / distance) * force * repulsionStrength;
                    }
                }

                this.x += this.velocityX;
                this.y += this.velocityY;
                this.velocityX *= 0.95; // Attrito
                this.velocityY *= 0.95;

                // Bounce & Wrap
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                drawPolygon(ctx, this.x, this.y, this.size, this.sides);
            }
        }

        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        /* --- LOGICA AUDIO --- */
        const audio = document.getElementById('bg-audio');
        const audioBtn = document.getElementById('audio-btn');
        const visualizer = document.getElementById('visualizer');
        const audioLabel = document.getElementById('audio-label');
        let isPlaying = false;

        function toggleAudio() {
            if (isPlaying) {
                audio.pause();
                visualizer.classList.remove('playing');
                audioBtn.style.opacity = "0.5";
                audioLabel.innerText = "DISCO OFF";
                audioLabel.style.opacity = "0.5";
            } else {
                audio.play().catch(e => {
                    console.log("Audio playback blocked.");
                });
                visualizer.classList.add('playing');
                audioBtn.style.opacity = "1";
                audioLabel.innerText = "DISCO ON";
                audioLabel.style.opacity = "1";
            }
            isPlaying = !isPlaying;
        }
        audioBtn.style.opacity = "0.5";
    </script>
</body>
</html>
