<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCOLOW - Coming Soon</title>
    <!-- Import Font Syne -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        /* Navigazione superiore */
        .top-nav {
            position: absolute;
            top: 2rem;
            width: 100%;
            display: flex;
            justify-content: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            z-index: 10;
        }

        .title-giant {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(4rem, 22vw, 14rem);
            letter-spacing: -0.05em;
            line-height: 0.8;
            text-transform: uppercase;
            user-select: none;
            text-align: center;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-word {
            display: block;
        }

        @media (min-width: 1024px) {
            .title-giant {
                flex-direction: row;
                gap: 0;
                line-height: 0.85;
            }
            .title-word {
                display: inline;
            }
        }

        .bottom-nav {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .bottom-nav {
                flex-direction: column;
                gap: 2rem;
                bottom: 2rem;
            }
            .flex-1 {
                text-align: center !important;
                width: 100%;
            }
            .order-mobile-1 { order: 1; }
            .order-mobile-2 { order: 2; }
            .order-mobile-3 { order: 3; }
        }

        a {
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid transparent;
        }

        a:hover {
            opacity: 0.6;
            border-bottom: 1px solid #fff;
        }

        .audio-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .audio-status-label {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .audio-control {
            cursor: pointer;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .audio-control:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .playing .bar {
            animation: sound 0.5s infinite ease-in-out alternate;
        }

        @keyframes sound {
            0% { height: 4px; }
            100% { height: 16px; }
        }

        .bar {
            width: 2px;
            height: 12px;
            background: white;
            margin: 0 1.5px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <!-- Navigazione Superiore -->
    <div class="top-nav">
        <span>8BINARY</span>
    </div>

    <!-- Titolo Principale -->
    <h1 class="title-giant">
        <span class="title-word">DISCO</span>
        <span class="title-word">LOW</span>
    </h1>

    <!-- Navigazione Inferiore -->
    <div class="bottom-nav">
        <!-- Sinistra: Instagram -->
        <div class="flex-1 text-left order-mobile-2">
            <a href="https://www.instagram.com/disco_low" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>

        <!-- Centro: Audio Control -->
        <div class="flex-1 flex justify-center order-mobile-1">
            <div class="audio-wrapper">
                <div id="audio-btn" class="audio-control" onclick="toggleAudio()" title="Play/Pause Audio">
                    <div id="visualizer" class="flex items-end h-4">
                        <span class="bar" style="animation-delay: 0.1s"></span>
                        <span class="bar" style="animation-delay: 0.3s"></span>
                        <span class="bar" style="animation-delay: 0.2s"></span>
                    </div>
                </div>
                <span id="audio-label" class="audio-status-label">DISCO OFF</span>
            </div>
        </div>

        <!-- Destra: Email -->
        <div class="flex-1 text-right order-mobile-3">
            <a href="mailto:info@8b8b.it">contact | booking</a>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="bg-audio" loop>
        <source src="Discolow_Jungle-Fu.mp3" type="audio/mpeg">
        Il tuo browser non supporta l'elemento audio.
    </audio>

    <script>
        const audio = document.getElementById('bg-audio');
        const audioBtn = document.getElementById('audio-btn');
        const visualizer = document.getElementById('visualizer');
        const audioLabel = document.getElementById('audio-label');
        let isPlaying = false;

        function toggleAudio() {
            if (isPlaying) {
                audio.pause();
                visualizer.classList.remove('playing');
                audioBtn.style.opacity = "0.5";
                audioLabel.innerText = "DISCO OFF";
                audioLabel.style.opacity = "0.5";
            } else {
                audio.play().catch(e => {
                    console.log("Audio playback blocked or file not found.");
                });
                visualizer.classList.add('playing');
                audioBtn.style.opacity = "1";
                audioLabel.innerText = "DISCO ON";
                audioLabel.style.opacity = "1";
            }
            isPlaying = !isPlaying;
        }

        audioBtn.style.opacity = "0.5";
    </script>
</body>
</html>
